        str_list_to_objs:
            value:
                ReqExample:
                    infos:
                        - https://assets.jcaigc.cn/min.mp4
                        - https://assets.jcaigc.cn/max.mp4
                RespExample:
                    infos:
                        - output: https://assets.jcaigc.cn/min.mp4
                        - output: https://assets.jcaigc.cn/max.mp4
        str_to_list:
