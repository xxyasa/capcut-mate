name: Build Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.0.100-internal.1"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            backend_add_data_sep: ";"
            installer_script: build-win-installer
            green_script: build-win-green
            artifact_name: capcut-mate-windows
            artifact_paths: |
              desktop-client/dist/capcut-mate-windows-x64-installer.exe
              desktop-client/dist/capcut-mate-windows-x64-green.zip
          - name: macOS
            os: macos-latest
            backend_add_data_sep: ":"
            installer_script: build-mac-installer
            green_script: build-mac-green
            artifact_name: capcut-mate-macos
            artifact_paths: |
              desktop-client/dist/capcut-mate-macos-arm64-installer.dmg
              desktop-client/dist/capcut-mate-macos-arm64-green.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            desktop-client/package-lock.json
            desktop-client/web/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify smart assets
        shell: bash
        run: |
          test -f "smart-assets/manifest.json"
          test -f "smart-assets/text_templates/文字模板2/key_value.json"
          test -f "smart-assets/sound_effects/音效库2/key_value.json"
          test -f "smart-assets/music/downLoadcfg"

      - name: Install Python dependencies
        shell: bash
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Build backend
        shell: bash
        run: |
          SEP='${{ matrix.backend_add_data_sep }}'
          uv run pyinstaller \
            --name capcut-mate-backend \
            --onedir \
            --add-data "template${SEP}template" \
            --add-data "config${SEP}config" \
            --add-data "assets${SEP}assets" \
            main.py

      - name: Install desktop dependencies
        working-directory: desktop-client
        run: npm ci

      - name: Install web dependencies
        working-directory: desktop-client/web
        run: npm ci

      - name: Build web UI
        working-directory: desktop-client
        run: npm run web:build

      - name: Build installer
        working-directory: desktop-client
        run: npm run ${{ matrix.installer_script }}

      - name: Build green package
        working-directory: desktop-client
        run: npm run ${{ matrix.green_script }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          compression-level: 0
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="internal-${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List release files
        shell: bash
        run: find release-artifacts -type f -maxdepth 3 -print

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.version }}
          name: CapCut Mate ${{ steps.release_version.outputs.version }}
          draft: false
          prerelease: true
          files: |
            release-artifacts/capcut-mate-windows/capcut-mate-windows-x64-installer.exe
            release-artifacts/capcut-mate-windows/capcut-mate-windows-x64-green.zip
            release-artifacts/capcut-mate-macos/capcut-mate-macos-arm64-installer.dmg
            release-artifacts/capcut-mate-macos/capcut-mate-macos-arm64-green.zip
